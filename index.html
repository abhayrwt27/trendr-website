<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendr.web - Claymorphic Dashboard</title>
    
    <!-- 1. LOAD REACT AND BABEL COMPILER VIA CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <!-- 2. THE TARGET ROOT ELEMENT FOR RAW WEBPAGE RENDERING -->
    <div id="root"></div>

    <!-- 3. PLACE THE COMPONENT CODE INSIDE A BABEL TEXT SCRIPT -->
    <script type="text/transform/babel">
        // Unpack React Hooks for CDN environment deployment
        const { useState, useRef, useEffect } = React;

        /* ─── CLAYMORPHISM & GLOBAL DESIGN SYSTEMS ─── */
        const UTILS_CSS = `
          @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
          * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
          body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
          }
          ::-webkit-scrollbar { width: 8px; height: 8px; }
          ::-webkit-scrollbar-track { background: transparent; }
          ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
          .dark-mode-global ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
          @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
          @keyframes popIn { 0% { transform: scale(0.9) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
          .float-ui { animation: float 4s ease-in-out infinite; }
          .pop-card { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        `;

        const TOKENS = {
          light: {
            bg: "#F0F3F9", panelBg: "#F7FAFF", textMain: "#2A2F3D", textMuted: "#6E7787", border: "rgba(255, 255, 255, 0.7)",
            clayCard: "inset 2px 2px 4px rgba(255,255,255,0.9), inset -2px -2px 4px rgba(165,180,210,0.3), 6px 12px 24px rgba(165,180,210,0.4)",
            clayBtn: "inset 1px 1px 3px rgba(255,255,255,0.8), inset -1px -1px 3px rgba(0,0,0,0.1), 3px 6px 12px rgba(165,180,210,0.3)",
            clayInput: "inset 2px 2px 5px rgba(0,0,0,0.05), inset -2px -2px 5px rgba(255,255,255,0.8), 0px 2px 4px rgba(0,0,0,0.02)",
            lovePink: "#FF8EAA", loveBg: "#FFEBF0", trustBlue: "#6C9EFF", trustBg: "#EEF4FF", connectPurple: "#A886FF", connectBg: "#F4F0FF", successMint: "#62D2A2", successBg: "#EFFFF9"
          },
          dark: {
            bg: "#181C26", panelBg: "#1F2432", textMain: "#F1F5F9", textMuted: "#94A3B8", border: "rgba(255, 255, 255, 0.04)",
            clayCard: "inset 2px 2px 4px rgba(255,255,255,0.08), inset -3px -3px 6px rgba(0,0,0,0.4), 8px 16px 32px rgba(0,0,0,0.5)",
            clayBtn: "inset 1px 1px 2px rgba(255,255,255,0.15), inset -2px -2px 4px rgba(0,0,0,0.4), 4px 8px 16px rgba(0,0,0,0.3)",
            clayInput: "inset 2px 2px 5px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(255,255,255,0.05)",
            lovePink: "#FF6584", loveBg: "rgba(255,101,132,0.12)", trustBlue: "#4A85FF", trustBg: "rgba(74,133,255,0.12)", connectPurple: "#9065FF", connectBg: "rgba(144,101,255,0.12)", successMint: "#3CD092", successBg: "rgba(60,208,146,0.12)"
          }
        };

        const INITIAL_PRODUCTS = [
          { id: "p1", name: "Ribbed Knit Co-ord Set", brand: "ZARA", price: 3299, orig: 5999, img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&q=80", tags: ["Trending", "New Look"], rating: 4.8, reviews: 2341, category: "Tops", desc: "Effortlessly chic ribbed knit set. Perfect for friendly social hangouts and outdoor coffee dates.", sizes: ["S", "M", "L"] },
          { id: "p2", name: "Oversized Leather Jacket", brand: "H&M", price: 4999, orig: 7999, img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600&q=80", tags: ["Hot Item"], rating: 4.6, reviews: 1829, category: "Tops", desc: "Bold oversized leather jacket with premium hardware configuration. Built to last.", sizes: ["M", "L", "XL"] },
          { id: "p3", name: "Y2K Cargo Pants", brand: "Zudio", price: 1499, orig: 2499, img: "https://images.unsplash.com/photo-1594938298603-c8148c4b4ae4?w=600&q=80", tags: ["Y2K", "Classic"], rating: 4.5, reviews: 987, category: "Bottoms", desc: "Wide-leg relaxed cargo pants with deep utility storage setups.", sizes: ["S", "M"] },
          { id: "p4", name: "Chunky Platform Boots", brand: "Steve Madden", price: 6799, orig: 9999, img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600&q=80", tags: ["Premium"], rating: 4.9, reviews: 3201, category: "Shoes", desc: "Statement aesthetic heavy chunky platform boots. High comfort ergonomics.", sizes: ["38", "39", "40"] }
        ];

        const COMPANIONS = [
          { id: "c1", name: "Ananya S.", age: 22, vibe: "Minimalist", match: 94, avatar: "👩🏻", active: true, mall: "Pacific Mall" },
          { id: "c2", name: "Riya K.", age: 21, vibe: "Y2K Style", match: 89, avatar: "👩🏽", active: true, mall: "Mall of Dehradun" },
          { id: "c3", name: "Meera T.", age: 23, vibe: "Boho Chic", match: 82, avatar: "👩🏼", active: false, mall: "Centrio Mall" }
        ];

        const REWARDS = [
          { id: "r1", code: "TRENDR40", label: "40% OFF", desc: "Mall of Dehradun Exclusive", expires: "2 days" },
          { id: "r2", code: "CASH15", label: "₹150 Back", desc: "Digital wallet cashback system", expires: "5 days" }
        ];

        function Trendr() {
          const [isDark, setIsDark] = useState(false);
          const [bag, setBag] = useState([]);
          const [wishlist, setWishlist] = useState(new Set(["p1"]));
          const [swipeIdx, setSwipeIdx] = useState(0);
          const [detailProd, setDetailProd] = useState(null);
          const [toast, setToast] = useState(null);
          const [isBagOpen, setIsBagOpen] = useState(false);
          const [connReqs, setConnReqs] = useState(new Set());
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
          const [isDragging, setIsDragging] = useState(false);

          const theme = isDark ? TOKENS.dark : TOKENS.light;

          const showToast = (msg, emoji = "✨") => {
            setToast({ msg, emoji });
            setTimeout(() => setToast(null), 3000);
          };

          const handleAddToBag = (product, size) => {
            setBag(prev => [...prev, { ...product, uniqueId: Date.now(), selectedSize: size }]);
            showToast(`Added ${product.name} (${size}) to your Bag!`, "🛍️");
          };

          const handleRemoveFromBag = (uniqueId) => {
            setBag(prev => prev.filter(item => item.uniqueId !== uniqueId));
            showToast("Removed look configuration from Bag", "🗑️");
          };

          const toggleWishlist = (id) => {
            setWishlist(w => {
              const n = new Set(w);
              if (n.has(id)) { n.delete(id); showToast("Removed from wishlist", "💔"); }
              else { n.add(id); showToast("Saved to look wishlist!", "💖"); }
              return n;
            });
          };

          const onPointerDown = (e) => {
            e.currentTarget.setPointerCapture(e.pointerId);
            setDragStart({ x: e.clientX, y: e.clientY });
            setIsDragging(true);
          };

          const onPointerMove = (e) => {
            if (!isDragging) return;
            setDragOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
          };

          const onPointerUp = (e) => {
            if (!isDragging) return;
            setIsDragging(false);
            const threshold = 140;
            if (dragOffset.x > threshold) {
              const currentProd = INITIAL_PRODUCTS[swipeIdx];
              if (currentProd) { setWishlist(w => { const n = new Set(w); n.add(currentProd.id); return n; }); showToast(`Loved ${currentProd.name}! Saved.`, "💖"); }
              setSwipeIdx(prev => prev + 1);
            } else if (dragOffset.x < -threshold) {
              showToast("Skipped look configuration", "👀");
              setSwipeIdx(prev => prev + 1);
            }
            setDragOffset({ x: 0, y: 0 });
          };

          const currentProduct = INITIAL_PRODUCTS[swipeIdx] || null;

          return (
            <div style={{ backgroundColor: theme.bg, color: theme.textMain, minHeight: "100vh", position: "relative" }} className={isDark ? "dark-mode-global" : ""}>
              <style>{UTILS_CSS}</style>

              <header style={{ 
                display: "flex", alignItems: "center", justifyContent: "space-between", 
                padding: "16px 40px", backgroundColor: theme.panelBg, borderBottom: `2px solid ${theme.border}`,
                boxShadow: theme.clayCard, position: "sticky", top: 0, zIndex: 100, borderRadius: "0 0 24px 24px"
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 42, height: 42, borderRadius: "14px", background: `linear-gradient(135deg, ${theme.lovePink}, ${theme.connectPurple})`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: theme.clayBtn }}>
                    <span style={{ fontSize: 22, color: "#FFF" }}>✦</span>
                  </div>
                  <span style={{ fontFamily: "'Syne', sans-serif", fontSize: 26, fontWeight: 800, letterSpacing: "-1px" }}>
                    Trendr<span style={{ color: theme.lovePink }}>.</span>web
                  </span>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                  <button onClick={() => setIsDark(!isDark)} className="float-ui" style={{
                    background: theme.panelBg, border: `1px solid ${theme.border}`, borderRadius: "50%",
                    width: 44, height: 44, cursor: "pointer", boxShadow: theme.clayBtn, fontSize: 18,
                    display: "flex", alignItems: "center", justifyContent: "center"
                  }}>
                    {isDark ? "☀️" : "🌙"}
                  </button>

                  <button onClick={() => setIsBagOpen(true)} style={{
                    background: theme.loveBg, border: `2px solid ${theme.lovePink}`, borderRadius: "20px",
                    padding: "10px 22px", cursor: "pointer", boxShadow: theme.clayBtn,
                    display: "flex", alignItems: "center", gap: 10, fontWeight: 700, color: theme.textMain
                  }}>
                    <span style={{ fontSize: 18 }}>🛍️</span>
                    <span style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Bag ({bag.length})</span>
                  </button>
                </div>
              </header>

              <main style={{ display: "grid", gridTemplateColumns: "1fr 440px 1fr", gap: 32, padding: "40px", maxWidth: 1600, margin: "0 auto" }} className="responsive-dashboard-grid">
                <style>{`@media(max-width: 1200px) { .responsive-dashboard-grid { grid-template-columns: 1fr !important; } }`}</style>

                {/* LEFT COLUMN */}
                <section style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                  <div style={{ backgroundColor: theme.panelBg, borderRadius: "28px", padding: "24px", boxShadow: theme.clayCard, border: `1px solid ${theme.border}` }} className="pop-card">
                    <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}><span>👯</span> Shopping Buddies</h3>
                    <p style={{ color: theme.textMuted, fontSize: 13, marginBottom: 16 }}>Match vectors computed from look interactions</p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                      {COMPANIONS.map(c => (
                        <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px", borderRadius: "20px", background: theme.bg, boxShadow: theme.clayBtn }}>
                          <div style={{ fontSize: 26, width: 44, height: 44, borderRadius: "50%", backgroundColor: theme.panelBg, display: "flex", alignItems: "center", justifyContent: "center" }}>{c.avatar}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 14 }}>{c.name} <span style={{ color: theme.trustBlue, fontSize: 11 }}>{c.match}% match</span></div>
                            <div style={{ fontSize: 11, color: theme.textMuted }}>{c.vibe} • {c.mall}</div>
                          </div>
                          <button onClick={() => { setConnReqs(prev => { const n = new Set(prev); n.add(c.id); return n; }); showToast(`Invite dispatched to ${c.name}`, "💌"); }} disabled={connReqs.has(c.id)} style={{ border: "none", background: connReqs.has(c.id) ? theme.successBg : theme.connectBg, color: connReqs.has(c.id) ? theme.successMint : theme.connectPurple, padding: "6px 12px", borderRadius: "12px", fontWeight: 700, fontSize: 12, cursor: "pointer", boxShadow: theme.clayBtn }}>{connReqs.has(c.id) ? "✓ Sent" : "Connect"}</button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ backgroundColor: theme.panelBg, borderRadius: "28px", padding: "24px", boxShadow: theme.clayCard, border: `1px solid ${theme.border}` }} className="pop-card">
                    <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, marginBottom: 12 }}>🎁 Verified Vouchers</h3>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {REWARDS.map(r => (
                        <div key={r.id} style={{ padding: "14px", borderRadius: "20px", background: theme.trustBg, border: `1px solid ${theme.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ fontWeight: 800, color: theme.trustBlue, fontSize: 16 }}>{r.label}</div>
                            <div style={{ fontSize: 12, fontWeight: 500 }}>{r.desc}</div>
                          </div>
                          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 12, background: theme.panelBg, padding: "6px 10px", borderRadius: "10px", fontWeight: 700 }}>{r.code}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                {/* CENTER COLUMN */}
                <section style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                  <div style={{ width: "100%", position: "relative", height: 530, display: "flex", justifyContent: "center" }}>
                    {currentProduct ? (
                      <div onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} style={{ position: "absolute", width: "100%", height: "500px", backgroundColor: theme.panelBg, borderRadius: "32px", overflow: "hidden", boxShadow: theme.clayCard, border: `4px solid ${theme.border}`, cursor: isDragging ? "grabbing" : "grab", touchAction: "none", transform: `translateX(${dragOffset.x}px) translateY(${dragOffset.y}px) rotate(${dragOffset.x * 0.05}deg)`, transition: isDragging ? "none" : "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)", zIndex: 10 }} className="pop-card">
                        <div style={{ width: "100%", height: "300px", position: "relative", userSelect: "none", pointerEvents: "none" }}>
                          <img src={currentProduct.img} alt={currentProduct.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "80px", background: `linear-gradient(to top, ${theme.panelBg}, transparent)` }} />
                          <div style={{ position: "absolute", top: 16, left: 16, display: "flex", gap: 6 }}>
                            {currentProduct.tags.map(t => <span key={t} style={{ backgroundColor: "rgba(0,0,0,0.6)", color: "#FFF", backdropFilter: "blur(4px)", padding: "4px 12px", borderRadius: "12px", fontSize: 11, fontWeight: 700 }}>{t}</span>)}
                          </div>
                        </div>
                        <div style={{ padding: "20px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                            <div>
                              <span style={{ fontSize: 11, fontWeight: 700, color: theme.textMuted, letterSpacing: "1px" }}>{currentProduct.brand}</span>
                              <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 700 }}>{currentProduct.name}</h2>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 20, fontWeight: 800, color: theme.lovePink, fontFamily: "'Space Grotesk', sans-serif" }}>₹{currentProduct.price}</div>
                              <div style={{ fontSize: 12, color: theme.textMuted, textDecoration: "line-through" }}>₹{currentProduct.orig}</div>
                            </div>
                          </div>
                          <p style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.5, marginBottom: 16 }}>{currentProduct.desc}</p>
                          <div style={{ display: "flex", gap: 12, justifyContent: "space-between", alignItems: "center" }}>
                            <button onClick={() => setDetailProd(currentProduct)} style={{ background: theme.bg, color: theme.textMain, border: `1px solid ${theme.border}`, padding: "8px 16px", borderRadius: "14px", cursor: "pointer", fontWeight: 600, fontSize: 13, boxShadow: theme.clayBtn }}>Configure Product →</button>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#FFC107" }}>★ {currentProduct.rating} ({currentProduct.reviews})</div>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div style={{ width: "100%", height: "500px", backgroundColor: theme.panelBg, borderRadius: "32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", boxShadow: theme.clayCard, border: `1px solid ${theme.border}`, padding: "40px", textAlign: "center" }}>
                        <span style={{ fontSize: 54, marginBottom: 16 }}>✨</span>
                        <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, marginBottom: 8 }}>Catalog Cycle Completed</h3>
                        <p style={{ color: theme.textMuted, fontSize: 14, marginBottom: 24 }}>You have processed all localized daily styling drops.</p>
                        <button onClick={() => setSwipeIdx(0)} style={{ background: theme.trustBg, color: theme.trustBlue, border: "none", padding: "12px 28px", borderRadius: "16px", fontWeight: 700, cursor: "pointer", boxShadow: theme.clayBtn }}>Refresh Styling Queue</button>
                      </div>
                    )}
                  </div>
                  {currentProduct && (
                    <div style={{ display: "flex", alignItems: "center", gap: 24, marginTop: -10 }}>
                      <button onClick={() => { showToast("Skipped look configuration", "👀"); setSwipeIdx(p => p + 1); }} style={{ width: 56, height: 56, borderRadius: "50%", background: theme.panelBg, border: `2px solid ${theme.border}`, boxShadow: theme.clayBtn, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                      <button onClick={() => toggleWishlist(currentProduct.id)} style={{ width: 48, height: 48, borderRadius: "50%", background: theme.panelBg, border: `2px solid ${theme.border}`, boxShadow: theme.clayBtn, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", color: wishlist.has(currentProduct.id) ? theme.lovePink : theme.textMuted }}>{wishlist.has(currentProduct.id) ? "♥" : "♡"}</button>
                      <button onClick={() => { showToast(`Loved ${currentProduct.name}!`, "💖"); setSwipeIdx(p => p + 1); }} style={{ width: 56, height: 56, borderRadius: "50%", background: theme.loveBg, border: `2px solid ${theme.lovePink}`, boxShadow: theme.clayBtn, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center", color: theme.lovePink }}>♥</button>
                    </div>
                  )}
                </section>

                {/* RIGHT COLUMN */}
                <section style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                  <div style={{ backgroundColor: theme.panelBg, borderRadius: "28px", padding: "24px", boxShadow: theme.clayCard, border: `1px solid ${theme.border}` }} className="pop-card">
                    <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, marginBottom: 14 }}>🔍 Catalog Spotlight</h3>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                      {INITIAL_PRODUCTS.map(p => (
                        <div key={p.id} onClick={() => setDetailProd(p)} style={{ background: theme.bg, borderRadius: "20px", padding: "10px", cursor: "pointer", boxShadow: theme.clayBtn, border: `1px solid ${theme.border}` }}>
                          <img src={p.img} alt={p.name} style={{ width: "100%", height: "110px", objectFit: "cover", borderRadius: "14px", marginBottom: 8 }} />
                          <div style={{ fontWeight: 700, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
                          <div style={{ fontSize: 12, color: theme.lovePink, fontWeight: 700 }}>₹{p.price}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>
              </main>

              {detailProd && (
                <div style={{ position: "fixed", inset: 0, backgroundColor: "rgba(0,0,0,0.5)", backdropFilter: "blur(6px)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ backgroundColor: theme.panelBg, borderRadius: "32px", padding: "32px", maxWidth: "500px", width: "90%", boxShadow: theme.clayCard, border: `4px solid ${theme.border}` }} className="pop-card">
                    <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, marginBottom: 8 }}>Configure Look</h3>
                    <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
                      <img src={detailProd.img} style={{ width: "100px", height: "100px", objectFit: "cover", borderRadius: "20px" }} />
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 16 }}>{detailProd.name}</div>
                        <div style={{ color: theme.lovePink, fontWeight: 800, fontSize: 18, marginTop: 4 }}>₹{detailProd.price}</div>
                      </div>
                    </div>
                    <div style={{ marginBottom: 24 }}>
                      <label style={{ display: "block", fontSize: 12, fontWeight: 700, marginBottom: 8, color: theme.textMuted }}>SIZE SEGMENTATION</label>
                      <div style={{ display: "flex", gap: 10 }}>
                        {detailProd.sizes.map(sz => <button key={sz} onClick={() => { handleAddToBag(detailProd, sz); setDetailProd(null); }} style={{ padding: "10px 20px", borderRadius: "14px", background: theme.bg, color: theme.textMain, border: `1px solid ${theme.border}`, cursor: "pointer", fontWeight: 700, boxShadow: theme.clayBtn }}>{sz}</button>)}
                      </div>
                    </div>
                    <button onClick={() => setDetailProd(null)} style={{ width: "100%", padding: "12px", borderRadius: "16px", background: "transparent", color: theme.textMuted, border: `1px solid ${theme.border}`, cursor: "pointer", fontWeight: 600 }}>Cancel Configuration</button>
                  </div>
                </div>
              )}

              {isBagOpen && (
                <div style={{ position: "fixed", inset: 0, backgroundColor: "rgba(0,0,0,0.6)", backdropFilter: "blur(8px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
                  <div style={{ position: "absolute", inset: 0 }} onClick={() => setIsBagOpen(false)} />
                  <div style={{ position: "relative", backgroundColor: theme.panelBg, borderRadius: "36px", padding: "40px", maxWidth: "640px", width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: theme.clayCard, border: `4px solid ${theme.border}`, animation: "popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                      <div>
                        <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 28, fontWeight: 800 }}>Your Styling Bag</h2>
                        <p style={{ color: theme.textMuted, fontSize: 13 }}>Review items curated for interactive checkout</p>
                      </div>
                      <button onClick={() => setIsBagOpen(false)} style={{ background: theme.bg, border: `1px solid ${theme.border}`, width: 44, height: 44, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, boxShadow: theme.clayBtn, color: theme.textMain }}>✕</button>
                    </div>

                    {bag.length > 0 ? (
                      <>
                        <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 32 }}>
                          {bag.map(item => (
                            <div key={item.uniqueId} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px", borderRadius: "24px", background: theme.bg, boxShadow: theme.clayBtn, border: `1px solid ${theme.border}` }}>
                              <img src={item.img} style={{ width: "70px", height: "70px", objectFit: "cover", borderRadius: "16px" }} />
                              <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 700, fontSize: 15 }}>{item.name}</div>
                                <div style={{ fontSize: 12, color: theme.textMuted }}>Size: <span style={{ fontWeight: 700, color: theme.textMain }}>{item.selectedSize}</span></div>
                                <div style={{ color: theme.lovePink, fontWeight: 700, fontSize: 14, marginTop: 4 }}>₹{item.price}</div>
                              </div>
                              <button onClick={() => handleRemoveFromBag(item.uniqueId)} style={{ background: "transparent", border: "none", color: theme.lovePink, cursor: "pointer", fontWeight: 600, fontSize: 13, padding: "8px" }}>Remove</button>
                            </div>
                          ))}
                        </div>

                        <div style={{ padding: "20px", borderRadius: "24px", backgroundColor: theme.bg, boxShadow: theme.clayInput, marginBottom: 32, border: `1px solid ${theme.border}` }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 10 }}><span style={{ color: theme.textMuted }}>Subtotal Aggregate</span><span style={{ fontWeight: 600 }}>₹{bag.reduce((acc, curr) => acc + curr.price, 0)}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 14 }}><span style={{ color: theme.textMuted }}>Trendr Processing Fee</span><span style={{ color: theme.successMint, fontWeight: 600 }}>FREE</span></div>
                          <div style={{ height: "2px", backgroundColor: theme.border, marginBottom: 14 }} />
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 18, fontWeight: 800 }}><span>Estimated Total</span><span style={{ color: theme.lovePink }}>₹{bag.reduce((acc, curr) => acc + curr.price, 0)}</span></div>
                        </div>

                        <button onClick={() => { showToast("Order Dispatched Successfully!", "🎉"); setBag([]); setIsBagOpen(false); }} style={{ width: "100%", padding: "16px", borderRadius: "20px", border: "none", background: `linear-gradient(135deg, ${theme.lovePink}, ${theme.connectPurple})`, color: "#FFF", fontFamily: "'Syne', sans-serif", fontSize: 16, fontWeight: 700, cursor: "pointer", boxShadow: theme.clayCard }}>Authorize Secure Checkout</button>
                      </>
                    ) : (
                      <div style={{ padding: "40px 0", textAlign: "center" }}><div style={{ fontSize: 44, marginBottom: 12 }}>🛍️</div><div style={{ fontWeight: 700, color: theme.textMuted }}>Your checkout pipeline is empty.</div></div>
                    )}
                  </div>
                </div>
              )}

              {toast && (
                <div style={{ position: "fixed", bottom: 40, right: 40, backgroundColor: theme.panelBg, border: `2px solid ${theme.border}`, borderRadius: "24px", padding: "16px 24px", display: "flex", alignItems: "center", gap: 12, zIndex: 2000, boxShadow: theme.clayCard, animation: "popIn 0.3s ease forwards" }}>
                  <span style={{ fontSize: 22 }}>{toast.emoji}</span>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>{toast.msg}</span>
                </div>
              )}
            </div>
          );
        }

        // Mount to Dom entry node
        const root = Bakel = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Trendr />);
    </script>
</body>
</html>
