<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendr.web - Claymorphic Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        :root {
            --bg: #F0F3F9;
            --panel-bg: #F7FAFF;
            --text-main: #2A2F3D;
            --text-muted: #6E7787;
            --border: rgba(255, 255, 255, 0.7);
            --clay-card: inset 2px 2px 4px rgba(255,255,255,0.9), inset -2px -2px 4px rgba(165,180,210,0.3), 6px 12px 24px rgba(165,180,210,0.4);
            --clay-btn: inset 1px 1px 3px rgba(255,255,255,0.8), inset -1px -1px 3px rgba(0,0,0,0.1), 3px 6px 12px rgba(165,180,210,0.3);
            --love-pink: #FF8EAA;
            --love-bg: #FFEBF0;
            --trust-blue: #6C9EFF;
            --trust-bg: #EEF4FF;
            --connect-purple: #A886FF;
            --connect-bg: #F4F0FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border);
            box-shadow: var(--clay-card);
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 24px 24px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--love-pink), var(--connect-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--clay-btn);
            color: white;
            font-size: 22px;
        }
        .logo-text { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }

        .bag-btn {
            background: var(--love-bg);
            border: 2px solid var(--love-pink);
            border-radius: 20px;
            padding: 10px 22px;
            cursor: pointer;
            box-shadow: var(--clay-btn);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--text-main);
        }

        main {
            display: grid;
            grid-template-columns: 1fr 440px 1fr;
            gap: 32px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--clay-card);
            border: 1px solid var(--border);
        }

        h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 12px; }
        
        .buddy-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 20px;
            background: var(--bg);
            box-shadow: var(--clay-btn);
            margin-bottom: 12px;
        }

        .card-center {
            background-color: var(--panel-bg);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--clay-card);
            border: 4px solid var(--border);
            text-align: center;
        }

        .card-img-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #e0e6ed, #d1dbe5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .card-details { padding: 20px; text-align: left; }
        .price { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--love-pink); }

        .actions-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
        }

        .action-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            box-shadow: var(--clay-btn);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-heart { background: var(--love-bg); border-color: var(--love-pink); color: var(--love-pink); }

        .spotlight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .spotlight-item {
            background: var(--bg);
            border-radius: 20px;
            padding: 10px;
            box-shadow: var(--clay-btn);
            border: 1px solid var(--border);
        }
        .mini-img { width: 100%; height: 100px; background: #e0e6ed; border-radius: 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        @media(max-width: 1200px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Trendr<span style="color: var(--love-pink)">.</span>web</div>
        </div>
        <button class="bag-btn">🛍️ <span>Bag (1)</span></button>
    </header>

    <main>
        <!-- LEFT PANEL -->
        <section style="display: flex; flex-direction: column; gap: 24px;">
            <div class="panel">
                <h3>👯 Shopping Buddies</h3>
                <div class="buddy-row">
                    <div style="font-size: 24px;">👩🏻</div>
                    <div style="flex: 1; font-size: 14px; font-weight:700;">Ananya S. <span style="color: var(--trust-blue); font-size:11px;">94% match</span></div>
                </div>
                <div class="buddy-row">
                    <div style="font-size: 24px;">👩🏽</div>
                    <div style="flex: 1; font-size: 14px; font-weight:700;">Riya K. <span style="color: var(--trust-blue); font-size:11px;">89% match</span></div>
                </div>
            </div>

            <div class="panel" style="background-color: var(--trust-bg)">
                <h3 style="color: var(--trust-blue)">🎁 Active Voucher</h3>
                <div style="font-weight: 700;">TRENDR40 (40% OFF)</div>
            </div>
        </section>

        <!-- CENTER SWIPER -->
        <section>
            <div class="card-center">
                <div class="card-img-placeholder">👗</div>
                <div class="card-details">
                    <div style="font-size: 11px; font-weight: 700; color: var(--text-muted);">ZARA</div>
                    <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 8px;">Ribbed Knit Co-ord Set</h2>
                    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">Effortlessly chic ribbed knit set. Perfect for friendly social hangouts and coffee dates.</p>
                    <div class="price">₹3,299</div>
                </div>
            </div>

            <div class="actions-row">
                <button class="action-circle">✕</button>
                <button class="action-circle action-heart">♥</button>
            </div>
        </section>

        <!-- RIGHT PANEL -->
        <section>
            <div class="panel">
                <h3>🔍 Catalog Spotlight</h3>
                <div class="spotlight-grid">
                    <div class="spotlight-item">
                        <div class="mini-img">🧥</div>
                        <div style="font-size: 12px; font-weight: 700;">Leather Jacket</div>
                    </div>
                    <div class="spotlight-item">
                        <div class="mini-img">👖</div>
                        <div style="font-size: 12px; font-weight: 700;">Cargo Pants</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
